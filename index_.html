        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }

<script>
(function() {
  // aguarda o mapa Leaflet estar disponível
  function init() {
    // tenta pegar o mapa Leaflet (qgis2web expõe como variável global 'map')
    var m = window.map;
    if (!m) {
      setTimeout(init, 500);
      return;
    }

    var modoAtivo = null;
    var pontos = [];

    var icones = {
      dengue: L.divIcon({
        html: '<div style="background:#F5A623;width:18px;height:18px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.3)"></div>',
        iconSize: [18, 18],
        iconAnchor: [9, 9],
        className: ''
      }),
      enchente: L.divIcon({
        html: '<div style="background:#1A35E8;width:18px;height:18px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.3)"></div>',
        iconSize: [18, 18],
        iconAnchor: [9, 9],
        className: ''
      })
    };

    window.ativarModo = function(tipo) {
      if (modoAtivo === tipo) {
        // desativa
        modoAtivo = null;
        document.body.classList.remove('modo-ativo');
        document.getElementById('msg-modo').style.display = 'none';
        document.getElementById('btn-dengue').classList.remove('ativo');
        document.getElementById('btn-enchente').classList.remove('ativo');
      } else {
        modoAtivo = tipo;
        document.body.classList.add('modo-ativo');
        document.getElementById('msg-modo').style.display = 'block';
        document.getElementById('btn-dengue').classList.toggle('ativo', tipo === 'dengue');
        document.getElementById('btn-enchente').classList.toggle('ativo', tipo === 'enchente');
      }
    };

    m.on('click', function(e) {
      if (!modoAtivo) return;

      var label = modoAtivo === 'dengue'
        ? 'Suscetibilidade a Dengue'
        : 'Suscetibilidade a Enchentes';

      var marker = L.marker([e.latlng.lat, e.latlng.lng], {
        icon: icones[modoAtivo]
      }).addTo(m);

      marker.bindPopup(
        '<strong>' + label + '</strong><br>' +
        'Lat: ' + e.latlng.lat.toFixed(5) + '<br>' +
        'Lng: ' + e.latlng.lng.toFixed(5) +
        '<br><br><a href="#" onclick="removerPonto(' + pontos.length + '); return false;" style="color:red;font-size:12px;">🗑 Remover</a>'
      );

      pontos.push({
        tipo: modoAtivo,
        label: label,
        lat: e.latlng.lat,
        lng: e.latlng.lng,
        marker: marker
      });

      document.getElementById('btn-baixar').style.display = 'block';

      // desativa modo após adicionar
      modoAtivo = null;
      document.body.classList.remove('modo-ativo');
      document.getElementById('msg-modo').style.display = 'none';
      document.getElementById('btn-dengue').classList.remove('ativo');
      document.getElementById('btn-enchente').classList.remove('ativo');
    });

    window.removerPonto = function(idx) {
      if (pontos[idx]) {
        pontos[idx].marker.remove();
        pontos[idx] = null;
      }
      var restantes = pontos.filter(function(p) { return p !== null; });
      if (restantes.length === 0) {
        document.getElementById('btn-baixar').style.display = 'none';
      }
    };

    window.baixarGeoJSON = function() {
      var features = pontos
        .filter(function(p) { return p !== null; })
        .map(function(p) {
          return {
            type: 'Feature',
            properties: { tipo: p.tipo, nome: p.label },
            geometry: { type: 'Point', coordinates: [p.lng, p.lat] }
          };
        });

      var geojson = JSON.stringify({ type: 'FeatureCollection', features: features }, null, 2);
      var blob = new Blob([geojson], { type: 'application/json' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'registros_de_risco.geojson';
      a.click();
      URL.revokeObjectURL(url);
    };
  }

  init();
})();
</script>
    
<script>
function toggleLegend(el) {
  el.classList.toggle('open');
  var body = el.nextElementSibling;
  if (body) body.classList.toggle('open');
}
// Force layer control to stay expanded
setTimeout(function() {
  var ctrl = document.querySelector('.leaflet-control-layers');
  if (ctrl) ctrl.classList.add('leaflet-control-layers-expanded');
}, 500);
</script>
</body>
